services:
  - type: web
    name: macro-dashboard-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: FRED_API_KEY
        sync: false
      - key: GITHUB_OWNER
        value: lj22503
      - key: GITHUB_REPO
        value: macroview
